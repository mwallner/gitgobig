name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev libayatana-appindicator3-dev

      - name: Build all crates
        run: cargo build --workspace

      - name: Run tests
        run: cargo test --workspace

  build-artifacts:
    name: Build release (${{ matrix.target }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cli_artifact: gitgobig-cli
            gui_artifact: gitgobig-gui
          - os: macos-latest
            target: aarch64-apple-darwin
            cli_artifact: gitgobig-cli
            gui_artifact: gitgobig-gui
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cli_artifact: gitgobig-cli.exe
            gui_artifact: gitgobig-gui.exe
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-release-

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev libayatana-appindicator3-dev

      - name: Build release binaries
        run: cargo build --workspace --release

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitgobig-cli-${{ matrix.target }}
          path: target/release/${{ matrix.cli_artifact }}

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitgobig-gui-${{ matrix.target }}
          path: target/release/${{ matrix.gui_artifact }}
